  <text x="740" y="322" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="10">Shared session | Serialized | 1 dedicated slot</text>

  <!-- ONE Session box -->
  <rect x="650" y="342" width="180" height="50" rx="10" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="1.2"/>
  <text x="740" y="365" text-anchor="middle" fill="#6ee7b7" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold">ONE Session</text>
  <text x="740" y="383" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Claude --resume</text>

