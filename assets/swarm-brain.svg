  <text x="220" y="322" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="10">Independent sessions | Parallel | Per-topic</text>

  <!-- Tab 1 -->
  <rect x="80" y="340" width="130" height="55" rx="8" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="145" y="362" text-anchor="middle" fill="#93c5fd" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">Tab 1</text>
  <text x="145" y="380" text-anchor="middle" fill="#64748b" font-family="Arial,Helvetica,sans-serif" font-size="9">"Deploy feature"</text>

  <!-- Tab 2 -->
  <rect x="230" y="340" width="130" height="55" rx="8" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="295" y="362" text-anchor="middle" fill="#93c5fd" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">Tab 2</text>
  <text x="295" y="380" text-anchor="middle" fill="#64748b" font-family="Arial,Helvetica,sans-serif" font-size="9">"Review PR #42"</text>

  <!-- Tab 3 (ghost) -->
  <rect x="130" y="410" width="120" height="48" rx="8" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4 2"/>
  <text x="190" y="438" text-anchor="middle" fill="#64748b" font-family="Arial,Helvetica,sans-serif" font-size="10" opacity="0.4">Tab 3 (available)</text>

  <!-- Chat slot label -->
  <text x="220" y="487" text-anchor="middle" fill="#3b82f6" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold" opacity="0.5">max_tabs - 1 slots</text>

