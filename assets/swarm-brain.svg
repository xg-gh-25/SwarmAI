  <text x="636" y="430" text-anchor="middle" fill="#f472b6" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">Slack</text>
  <line x1="636" y1="412" x2="700" y2="392" stroke="#f472b6" stroke-width="1" opacity="0.4"/>
  <polygon points="698,389 702,395 696,394" fill="#f472b6" opacity="0.4"/>

  <!-- Feishu -->
  <rect x="690" y="412" width="72" height="26" rx="6" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="0.7"/>
  <text x="726" y="430" text-anchor="middle" fill="#22d3ee" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">Feishu</text>
  <line x1="726" y1="412" x2="740" y2="392" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  <polygon points="738,389 742,395 736,394" fill="#22d3ee" opacity="0.4"/>

  <!-- Future -->
  <rect x="780" y="412" width="100" height="26" rx="6" fill="#94a3b8" fill-opacity="0.05" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="830" y="429" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9" opacity="0.4">WeChat  Teams ...</text>
  <line x1="830" y1="412" x2="780" y2="392" stroke="#94a3b8" stroke-width="0.8" opacity="0.2" stroke-dasharray="3 2"/>

  <!-- Channel slot label -->
  <text x="740" y="460" text-anchor="middle" fill="#10b981" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold" opacity="0.5">1 dedicated slot (always reserved)</text>

  <!-- ================================================================ -->
  <!-- USER IDENTITY MAP (bottom center) -->
  <!-- ================================================================ -->
  <rect x="320" y="498" width="320" height="38" rx="8" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="4 2" stroke-opacity="0.4"/>
  <text x="480" y="515" text-anchor="middle" fill="#fbbf24" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">USER IDENTITY MAP</text>
  <text x="480" y="530" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Slack W017T04E  =  Feishu ou_abc  =  WeChat wxid_xxx  =  user_key "xg"</text>

  <!-- Identity arrows from channels to map -->
  <line x1="636" y1="438" x2="550" y2="498" stroke="#f59e0b" stroke-width="0.8" opacity="0.2" stroke-dasharray="3 2"/>
  <line x1="726" y1="438" x2="560" y2="498" stroke="#f59e0b" stroke-width="0.8" opacity="0.2" stroke-dasharray="3 2"/>

  <!-- ================================================================ -->
  <!-- Center divider -->
  <!-- ================================================================ -->
  <line x1="480" y1="275" x2="480" y2="490" stroke="#334155" stroke-width="0.8" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- ================================================================ -->
  <!-- Legend -->
  <!-- ================================================================ -->
  <g transform="translate(80, 548)">
    <rect x="-4" y="-5" width="8" height="8" rx="2" fill="#3b82f6" opacity="0.6"/>
    <text x="10" y="3" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Chat (parallel, per-topic)</text>

    <rect x="196" y="-5" width="8" height="8" rx="2" fill="#10b981" opacity="0.6"/>
    <text x="210" y="3" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Channel (serialized, shared)</text>

    <rect x="416" y="-5" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.6"/>
    <text x="430" y="3" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Shared memory (all sessions)</text>

    <rect x="636" y="-5" width="8" height="8" rx="2" fill="#8b5cf6" opacity="0.6"/>
    <text x="650" y="3" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Cross-session awareness</text>
  </g>
</svg>
