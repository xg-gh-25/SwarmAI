<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1019"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="560" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#f59e0b">
    <line x1="0" y1="100" x2="960" y2="100" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="960" y2="200" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="960" y2="300" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="960" y2="400" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="560" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="560" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="560" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" fill="#f59e0b" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold" letter-spacing="2">SWARM BRAIN</text>
  <text x="480" y="60" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="11">One AI, Every Channel, Shared Memory</text>

  <!-- ================================================================ -->
  <!-- L1: SHARED MEMORY (top layer) -->
  <!-- ================================================================ -->
  <rect x="80" y="78" width="800" height="90" rx="12" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.6"/>
  <text x="120" y="100" fill="#f59e0b" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" opacity="0.9">L1 : SHARED MEMORY</text>
  <text x="330" y="100" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="10" opacity="0.5">loaded into every session at prompt build</text>

  <!-- Memory file boxes -->
  <g opacity="0.9">
    <rect x="100" y="112" width="115" height="38" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="157" y="136" text-anchor="middle" fill="#fbbf24" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">MEMORY.md</text>

    <rect x="230" y="112" width="100" height="38" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="280" y="136" text-anchor="middle" fill="#fbbf24" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">USER.md</text>

    <rect x="345" y="112" width="125" height="38" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="407" y="136" text-anchor="middle" fill="#fbbf24" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">EVOLUTION.md</text>

    <rect x="485" y="112" width="120" height="38" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="545" y="136" text-anchor="middle" fill="#fbbf24" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">DailyActivity</text>

    <rect x="620" y="112" width="110" height="38" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="675" y="136" text-anchor="middle" fill="#fbbf24" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">Knowledge/</text>

    <rect x="745" y="112" width="115" height="38" rx="6" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.25" stroke-dasharray="3 2"/>
    <text x="802" y="136" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="10" opacity="0.5">+6 more files</text>
  </g>

  <!-- ================================================================ -->
  <!-- L3: ACTIVE SESSION DIGEST (bridge layer) -->
  <!-- ================================================================ -->
  <rect x="260" y="192" width="440" height="38" rx="8" fill="#8b5cf6" fill-opacity="0.08" stroke="url(#purple)" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="480" y="216" text-anchor="middle" fill="#a78bfa" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">L3 : ACTIVE SESSION DIGEST — cross-session awareness</text>

  <!-- L3 arrows down to sessions -->
  <line x1="370" y1="230" x2="220" y2="278" stroke="#a78bfa" stroke-width="1" opacity="0.35"/>
  <polygon points="217,275 223,281 226,274" fill="#a78bfa" opacity="0.35"/>

  <line x1="590" y1="230" x2="740" y2="278" stroke="#a78bfa" stroke-width="1" opacity="0.35"/>
  <polygon points="737,274 740,281 743,275" fill="#a78bfa" opacity="0.35"/>

  <!-- L1 read arrows down -->
  <line x1="220" y1="168" x2="220" y2="192" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>
  <line x1="220" y1="230" x2="220" y2="278" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>
  <line x1="740" y1="168" x2="740" y2="192" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>
  <line x1="740" y1="230" x2="740" y2="278" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>

  <!-- Vertical labels -->
  <text x="195" y="250" fill="#f59e0b" font-family="Arial,Helvetica,sans-serif" font-size="8" opacity="0.35" transform="rotate(-90,195,250)">reads / writes</text>
  <text x="765" y="250" fill="#f59e0b" font-family="Arial,Helvetica,sans-serif" font-size="8" opacity="0.35" transform="rotate(-90,765,250)">reads / writes</text>

