    <rect x="0" y="0" width="160" height="100" rx="12" fill="#1e1e36" stroke="#ef4444" stroke-width="1.5" opacity="0.95"/>
    <rect x="0" y="0" width="160" height="100" rx="12" fill="url(#red)" opacity="0.08"/>
    <circle cx="28" cy="28" r="14" fill="#ef4444" opacity="0.15"/>
    <path d="M 28,19 L 34,25 L 34,33 L 28,37 L 22,33 L 22,25 Z" fill="none" stroke="#fca5a5" stroke-width="1.5" opacity="0.8"/>
    <line x1="28" y1="25" x2="28" y2="31" stroke="#fca5a5" stroke-width="1.5" opacity="0.8"/>
    <text x="50" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fca5a5" letter-spacing="0.5">Self-Health</text>
    <text x="14" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Service monitoring</text>
    <text x="14" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Auto-restart on crash</text>
    <text x="14" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Resource diagnostics</text>
    <circle cx="142" cy="16" r="4" fill="#10b981"/>
  </g>

  <!-- Node 5: Self-Jobs (bottom center) -->
  <g transform="translate(430, 370)">
    <rect x="0" y="0" width="160" height="100" rx="12" fill="#1e1e36" stroke="#06b6d4" stroke-width="1.5" opacity="0.95"/>
    <rect x="0" y="0" width="160" height="100" rx="12" fill="url(#cyan)" opacity="0.08"/>
    <circle cx="28" cy="28" r="14" fill="#06b6d4" opacity="0.15"/>
    <circle cx="28" cy="28" r="5" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.8"/>
    <circle cx="28" cy="28" r="2" fill="#67e8f9" opacity="0.8"/>
    <g stroke="#67e8f9" stroke-width="1.5" opacity="0.6">
      <line x1="28" y1="19" x2="28" y2="22"/><line x1="28" y1="34" x2="28" y2="37"/>
      <line x1="19" y1="28" x2="22" y2="28"/><line x1="34" y1="28" x2="37" y2="28"/>
    </g>
    <text x="50" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#67e8f9" letter-spacing="0.5">Self-Jobs</text>
