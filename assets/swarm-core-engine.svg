    <text x="14" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Sidecar services</text>
    <text x="14" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Signal pipeline</text>
    <circle cx="142" cy="16" r="4" fill="#10b981"/>
  </g>

  <!-- Node 6: Self-Harness (bottom right) -->
  <g transform="translate(660, 370)">
    <rect x="0" y="0" width="160" height="100" rx="12" fill="#1e1e36" stroke="#10b981" stroke-width="1.5" opacity="0.95"/>
    <rect x="0" y="0" width="160" height="100" rx="12" fill="url(#green)" opacity="0.08"/>
    <circle cx="28" cy="28" r="14" fill="#10b981" opacity="0.15"/>
    <circle cx="26" cy="26" r="6" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.8"/>
    <line x1="30" y1="30" x2="36" y2="36" stroke="#6ee7b7" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
    <text x="50" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#6ee7b7" letter-spacing="0.5">Self-Harness</text>
    <text x="14" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Validate context files</text>
    <text x="14" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Detect DDD staleness</text>
    <text x="14" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Auto-refresh indexes</text>
    <circle cx="142" cy="16" r="4" fill="#10b981"/>
  </g>

  <!-- ==================== CENTER HUB ==================== -->
  <g transform="translate(420, 265)">
    <rect x="0" y="0" width="180" height="80" rx="40" fill="#1a1a2e" stroke="#f59e0b" stroke-width="2" opacity="0.95" filter="url(#glow)"/>
    <rect x="0" y="0" width="180" height="80" rx="40" fill="url(#gold)" opacity="0.06"/>
    <text x="90" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#f59e0b" letter-spacing="1">COMPOUND</text>
    <text x="90" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#f59e0b" letter-spacing="1">LOOP</text>
  </g>

  <!-- Hub connections (from center to each node) -->
  <g stroke="#f59e0b" stroke-width="1" opacity="0.2">
    <line x1="480" y1="265" x2="360" y2="230"/>
    <line x1="520" y1="265" x2="570" y2="230"/>
    <line x1="560" y1="290" x2="700" y2="230"/>
    <line x1="560" y1="320" x2="660" y2="370"/>
    <line x1="480" y1="345" x2="510" y2="370"/>
    <line x1="440" y1="345" x2="330" y2="370"/>
    <line x1="420" y1="290" x2="280" y2="230"/>
  </g>

  <!-- ==================== GROWTH TRAJECTORY (bottom) ==================== -->
  <g transform="translate(80, 520)">
    <!-- Track line -->
    <line x1="0" y1="22" x2="800" y2="22" stroke="#334155" stroke-width="2"/>

    <!-- L0 -->
    <circle cx="40" cy="22" r="8" fill="#334155" stroke="#64748b" stroke-width="1.5"/>
    <text x="40" y="26" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#94a3b8">L0</text>
    <text x="40" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Reactive</text>

    <!-- L1 -->
    <circle cx="240" cy="22" r="8" fill="#334155" stroke="#64748b" stroke-width="1.5"/>
    <text x="240" y="26" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#94a3b8">L1</text>
    <text x="240" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Self-Maintaining</text>

    <!-- L2 (current - highlighted) -->
    <circle cx="420" cy="22" r="12" fill="#f59e0b" stroke="#fbbf24" stroke-width="2" filter="url(#glow)"/>
    <text x="420" y="27" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="800" fill="#1a1a2e">L2</text>
    <text x="420" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#fbbf24">Self-Improving</text>
    <text x="420" y="64" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">(current)</text>

    <!-- L3 (in progress) -->
    <circle cx="580" cy="22" r="10" fill="#1e1e36" stroke="#3b82f6" stroke-width="2"/>
    <text x="580" y="26" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#93c5fd">L3</text>
    <text x="580" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#3b82f6">Self-Governing</text>
    <text x="580" y="64" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">(in progress)</text>

    <!-- L4 -->
    <circle cx="760" cy="22" r="8" fill="#1e1e36" stroke="#10b981" stroke-width="1.5"/>
    <text x="760" y="26" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#6ee7b7">L4</text>
    <text x="760" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#10b981">Autonomous</text>

    <!-- Progress fill (L0 to L2) -->
    <line x1="0" y1="22" x2="420" y2="22" stroke="#f59e0b" stroke-width="2.5" opacity="0.6"/>

    <!-- Label -->
    <text x="400" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" letter-spacing="2">GROWTH TRAJECTORY</text>
  </g>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(32, 130)">
    <text x="0" y="0" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" letter-spacing="1">FLYWHEELS</text>
    <circle cx="8" cy="18" r="4" fill="#8b5cf6" opacity="0.6"/>
    <text x="18" y="22" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Evolution</text>
    <circle cx="8" cy="36" r="4" fill="#3b82f6" opacity="0.6"/>
    <text x="18" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Memory</text>
    <circle cx="8" cy="54" r="4" fill="#f59e0b" opacity="0.6"/>
    <text x="18" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Context</text>
    <circle cx="8" cy="72" r="4" fill="#ef4444" opacity="0.6"/>
    <text x="18" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Health</text>
    <circle cx="8" cy="90" r="4" fill="#06b6d4" opacity="0.6"/>
    <text x="18" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Jobs</text>
    <circle cx="8" cy="108" r="4" fill="#10b981" opacity="0.6"/>
    <text x="18" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Harness</text>
  </g>

  <!-- Status legend -->
  <g transform="translate(32, 290)">
    <circle cx="8" cy="0" r="3.5" fill="#10b981"/>
    <text x="18" y="4" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Active</text>
    <line x1="0" y1="18" x2="16" y2="18" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <text x="22" y="22" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">Data flow</text>
  </g>

  <!-- Tagline -->
  <text x="480" y="608" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#475569" letter-spacing="1">Every session makes the next one better. The system doesn't just run — it compounds.</text>
</svg>