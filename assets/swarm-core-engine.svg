<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1019"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <!-- Filters may be stripped by GitHub SVG sanitizer - graceful degradation -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b" opacity="0.7"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#f59e0b">
    <line x1="0" y1="100" x2="960" y2="100" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="960" y2="200" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="960" y2="300" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="960" y2="400" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="960" y2="500" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="620" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="620" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="620" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="620" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="620" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="480" y="46" text-anchor="middle" font-family="system-ui,-apple-system,SF Pro Display,sans-serif" font-size="24" font-weight="700" fill="#f59e0b" letter-spacing="3" filter="url(#glow)">SWARM CORE ENGINE</text>
  <text x="480" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8" letter-spacing="1">The Self-Growing Intelligence</text>

  <!-- ==================== CONNECTION ARROWS (behind nodes) ==================== -->

  <!-- Outer ring: clockwise flow arrows -->
  <!-- Evolution -> Memory -->
  <path d="M 350,155 C 380,140 420,140 450,160" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.3" marker-end="url(#arrowGold)" stroke-dasharray="4,3"/>
  <!-- Memory -> Context -->
  <path d="M 630,160 C 660,140 700,140 730,155" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.3" marker-end="url(#arrowGold)" stroke-dasharray="4,3"/>
  <!-- Context -> Harness -->
  <path d="M 810,260 C 830,290 830,340 810,370" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.3" marker-end="url(#arrowGold)" stroke-dasharray="4,3"/>
  <!-- Harness -> Jobs -->
  <path d="M 730,470 C 700,490 660,490 630,470" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.3" marker-end="url(#arrowGold)" stroke-dasharray="4,3"/>
  <!-- Jobs -> Health -->
  <path d="M 450,470 C 420,490 380,490 350,470" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.3" marker-end="url(#arrowGold)" stroke-dasharray="4,3"/>
  <!-- Health -> Evolution -->
  <path d="M 230,370 C 210,340 210,290 230,260" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.3" marker-end="url(#arrowGold)" stroke-dasharray="4,3"/>

  <!-- Cross connections (subtle) -->
  <!-- Memory -> Harness -->
  <path d="M 570,240 C 620,290 670,340 720,385" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.15" marker-end="url(#arrowWhite)" stroke-dasharray="3,4"/>
  <!-- Evolution -> Context -->
  <path d="M 350,210 C 450,240 630,240 730,210" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.15" marker-end="url(#arrowWhite)" stroke-dasharray="3,4"/>
  <!-- Health -> Jobs -->
  <path d="M 330,430 C 380,440 450,440 490,430" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.15" marker-end="url(#arrowWhite)" stroke-dasharray="3,4"/>
  <!-- Memory -> Jobs (center cross) -->
  <path d="M 540,240 C 530,310 530,370 540,400" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.12" marker-end="url(#arrowWhite)" stroke-dasharray="3,4"/>

  <!-- ==================== FLYWHEEL NODES ==================== -->

  <!-- Node 1: Self-Evolution (top center) -->
  <g transform="translate(280, 130)">
    <rect x="0" y="0" width="160" height="100" rx="12" fill="#1e1e36" stroke="#8b5cf6" stroke-width="1.5" opacity="0.95"/>
    <rect x="0" y="0" width="160" height="100" rx="12" fill="url(#purple)" opacity="0.08"/>
    <circle cx="28" cy="28" r="14" fill="#8b5cf6" opacity="0.15"/>
    <polygon points="28,16 31,25 40,25 33,30 35,39 28,34 21,39 23,30 16,25 25,25" fill="#c4b5fd" opacity="0.8"/>
    <text x="50" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#c4b5fd" letter-spacing="0.5">Self-Evolution</text>
    <text x="14" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Learn capabilities</text>
    <text x="14" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Capture corrections</text>
    <text x="14" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Never repeat mistakes</text>
    <!-- Status dot -->
    <circle cx="142" cy="16" r="4" fill="#10b981"/>
  </g>

  <!-- Node 2: Self-Memory (top right of center) -->
  <g transform="translate(490, 130)">
    <rect x="0" y="0" width="160" height="100" rx="12" fill="#1e1e36" stroke="#3b82f6" stroke-width="1.5" opacity="0.95"/>
    <rect x="0" y="0" width="160" height="100" rx="12" fill="url(#blue)" opacity="0.08"/>
    <circle cx="28" cy="28" r="14" fill="#3b82f6" opacity="0.15"/>
    <circle cx="28" cy="28" r="9" fill="none" stroke="#93c5fd" stroke-width="1.5" opacity="0.8"/>
    <path d="M 22,28 Q 28,20 34,28 Q 28,36 22,28" fill="#93c5fd" opacity="0.5"/>
    <text x="50" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#93c5fd" letter-spacing="0.5">Self-Memory</text>
    <text x="14" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">3-layer distillation</text>
    <text x="14" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Git-verified accuracy</text>
    <text x="14" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">LLM-powered pruning</text>
    <circle cx="142" cy="16" r="4" fill="#10b981"/>
  </g>

  <!-- Node 3: Self-Context (right) -->
  <g transform="translate(700, 130)">
    <rect x="0" y="0" width="160" height="100" rx="12" fill="#1e1e36" stroke="#f59e0b" stroke-width="1.5" opacity="0.95"/>
    <rect x="0" y="0" width="160" height="100" rx="12" fill="url(#gold)" opacity="0.08"/>
    <circle cx="28" cy="28" r="14" fill="#f59e0b" opacity="0.15"/>
    <circle cx="28" cy="28" r="9" fill="none" stroke="#fcd34d" stroke-width="1.5" opacity="0.6"/>
    <circle cx="28" cy="28" r="5" fill="none" stroke="#fcd34d" stroke-width="1" opacity="0.6"/>
    <circle cx="28" cy="28" r="2" fill="#fcd34d" opacity="0.8"/>
    <text x="50" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fcd34d" letter-spacing="0.5">Self-Context</text>
    <text x="14" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">11-file priority chain</text>
    <text x="14" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Token budget mgmt</text>
    <text x="14" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">L0/L1 smart caching</text>
    <circle cx="142" cy="16" r="4" fill="#10b981"/>
  </g>

  <!-- Node 4: Self-Health (bottom left) -->
