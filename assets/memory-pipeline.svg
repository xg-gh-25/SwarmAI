<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1019"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b" opacity="0.7"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="960" height="440" rx="16" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#f59e0b">
    <line x1="0" y1="100" x2="960" y2="100" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="960" y2="200" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="960" y2="300" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="440" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="440" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="440" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" fill="#3b82f6" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold" letter-spacing="2">MEMORY PIPELINE</text>
  <text x="480" y="60" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="11">Three-Layer Distillation: Session Activity to Durable Knowledge</text>

  <!-- ============ LAYER 1: Session Capture ============ -->
  <text x="130" y="92" text-anchor="middle" fill="#64748b" font-family="Arial,Helvetica,sans-serif" font-size="10" letter-spacing="1">LAYER 1: CAPTURE</text>

  <rect x="40" y="108" width="180" height="120" rx="10" fill="#1e1e36" stroke="#3b82f6" stroke-width="1.2" opacity="0.95"/>
  <rect x="40" y="108" width="180" height="120" rx="10" fill="url(#blue)" opacity="0.06"/>
  <text x="130" y="132" text-anchor="middle" fill="#93c5fd" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold">Chat Session</text>
  <text x="130" y="150" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Decisions made</text>
  <text x="130" y="164" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Code committed</text>
  <text x="130" y="178" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Lessons learned</text>
  <text x="130" y="192" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Files changed</text>
  <text x="130" y="212" text-anchor="middle" fill="#64748b" font-family="Arial,Helvetica,sans-serif" font-size="8">DailyActivityExtractionHook</text>

  <!-- Arrow to Layer 2 -->
  <path d="M 220,168 L 280,168" stroke="#f59e0b" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowGold)"/>
  <text x="250" y="160" text-anchor="middle" fill="#f59e0b" font-family="Arial,Helvetica,sans-serif" font-size="8" opacity="0.6">auto</text>

  <!-- ============ LAYER 2: DailyActivity ============ -->
  <text x="395" y="92" text-anchor="middle" fill="#64748b" font-family="Arial,Helvetica,sans-serif" font-size="10" letter-spacing="1">LAYER 2: RAW LOGS</text>

  <rect x="285" y="108" width="220" height="120" rx="10" fill="#1e1e36" stroke="#f59e0b" stroke-width="1.2" opacity="0.95"/>
  <rect x="285" y="108" width="220" height="120" rx="10" fill="url(#gold)" opacity="0.06"/>
  <text x="395" y="132" text-anchor="middle" fill="#fbbf24" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold">DailyActivity/</text>
  <text x="395" y="150" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">2026-03-26.md (today)</text>
  <text x="395" y="164" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">2026-03-25.md (yesterday)</text>
  <text x="395" y="178" text-anchor="middle" fill="#64748b" font-family="Arial,Helvetica,sans-serif" font-size="9">...</text>
  <text x="395" y="194" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Per-session: deliverables, git,</text>
  <text x="395" y="208" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">decisions, lessons, next steps</text>

  <!-- Arrow to Layer 3 -->
  <path d="M 505,168 L 565,168" stroke="#f59e0b" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowGold)"/>
  <text x="535" y="155" text-anchor="middle" fill="#f59e0b" font-family="Arial,Helvetica,sans-serif" font-size="8" opacity="0.6">distill</text>
  <text x="535" y="167" text-anchor="middle" fill="#f59e0b" font-family="Arial,Helvetica,sans-serif" font-size="8" opacity="0.6">>=3 files</text>

  <!-- ============ LAYER 3: MEMORY.md ============ -->
  <text x="700" y="92" text-anchor="middle" fill="#64748b" font-family="Arial,Helvetica,sans-serif" font-size="10" letter-spacing="1">LAYER 3: CURATED MEMORY</text>

  <rect x="570" y="108" width="260" height="120" rx="10" fill="#1e1e36" stroke="#8b5cf6" stroke-width="1.5" opacity="0.95"/>
  <rect x="570" y="108" width="260" height="120" rx="10" fill="url(#purple)" opacity="0.06"/>
  <text x="700" y="132" text-anchor="middle" fill="#c4b5fd" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold">MEMORY.md</text>
  <text x="700" y="150" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Open Threads (P0/P1/P2)</text>
  <text x="700" y="164" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Key Decisions + Lessons Learned</text>
  <text x="700" y="178" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">COE Registry (worst bugs)</text>
  <text x="700" y="192" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Recent Context (rolling 30 days)</text>
  <text x="700" y="212" text-anchor="middle" fill="#64748b" font-family="Arial,Helvetica,sans-serif" font-size="8">Read at every session start</text>

  <!-- ============ GIT VERIFICATION (bottom center) ============ -->
  <rect x="260" y="270" width="240" height="60" rx="10" fill="#1e1e36" stroke="#ef4444" stroke-width="1.2" opacity="0.95"/>
  <rect x="260" y="270" width="240" height="60" rx="10" fill="url(#red)" opacity="0.06"/>
  <text x="380" y="295" text-anchor="middle" fill="#fca5a5" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">Git Cross-Reference</text>
  <text x="380" y="315" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Verify implementation claims against git log</text>

  <!-- Arrow from distillation down to git -->
  <path d="M 535,185 C 535,230 500,260 470,270" stroke="#ef4444" stroke-width="1" opacity="0.4" stroke-dasharray="4 3"/>
  <text x="520" y="240" fill="#fca5a5" font-family="Arial,Helvetica,sans-serif" font-size="8" opacity="0.6">verify before</text>
  <text x="520" y="252" fill="#fca5a5" font-family="Arial,Helvetica,sans-serif" font-size="8" opacity="0.6">promoting</text>

  <!-- Arrow from git back up to MEMORY -->
  <path d="M 500,290 C 560,280 600,260 660,228" stroke="#ef4444" stroke-width="1" opacity="0.4" stroke-dasharray="4 3" marker-end="url(#arrowRed)"/>

  <!-- Unverified tag rejected -->
  <path d="M 380,330 L 380,360" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
  <rect x="320" y="360" width="120" height="24" rx="5" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="380" y="376" text-anchor="middle" fill="#fca5a5" font-family="Arial,Helvetica,sans-serif" font-size="9">[UNVERIFIED] tagged</text>

  <!-- ============ WEEKLY MAINTENANCE ============ -->
  <rect x="610" y="270" width="260" height="60" rx="10" fill="#1e1e36" stroke="#10b981" stroke-width="1.2" opacity="0.95"/>
  <rect x="610" y="270" width="260" height="60" rx="10" fill="url(#green)" opacity="0.06"/>
  <text x="740" y="295" text-anchor="middle" fill="#6ee7b7" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">Weekly LLM Maintenance</text>
  <text x="740" y="315" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Prune resolved threads, archive stale entries</text>

  <!-- Arrow from MEMORY to maintenance -->
  <path d="M 740,228 L 740,270" stroke="#10b981" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- ============ FEEDBACK LOOP ============ -->
  <!-- Arrow from MEMORY back to sessions -->
  <path d="M 570,190 C 400,250 200,250 100,228" stroke="#8b5cf6" stroke-width="1.5" opacity="0.25" stroke-dasharray="5 3"/>
  <text x="340" y="248" text-anchor="middle" fill="#c4b5fd" font-family="Arial,Helvetica,sans-serif" font-size="9" opacity="0.6">feeds next session</text>

  <!-- ============ LIFECYCLE BAR ============ -->
  <g transform="translate(40, 400)">
    <line x1="0" y1="10" x2="880" y2="10" stroke="#334155" stroke-width="1.5"/>

    <circle cx="80" cy="10" r="5" fill="#3b82f6"/>
    <text x="80" y="30" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Capture</text>

    <circle cx="290" cy="10" r="5" fill="#f59e0b"/>
    <text x="290" y="30" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Log (30 days)</text>

    <circle cx="500" cy="10" r="5" fill="#ef4444"/>
    <text x="500" y="30" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Verify (git)</text>

    <circle cx="660" cy="10" r="5" fill="#8b5cf6"/>
    <text x="660" y="30" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Promote</text>

    <circle cx="820" cy="10" r="5" fill="#10b981"/>
    <text x="820" y="30" text-anchor="middle" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="9">Prune (weekly)</text>

    <!-- Progress fill -->
    <line x1="0" y1="10" x2="880" y2="10" stroke="#f59e0b" stroke-width="2" opacity="0.2"/>
  </g>
</svg>
