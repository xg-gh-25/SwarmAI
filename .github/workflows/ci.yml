name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: smoke import on Linux ────────────────────────────
  # Full test suite runs locally (macOS, 700+ tests, ~3min with xdist).
  # CI only verifies all modules import cleanly on Linux — catches missing
  # deps, syntax errors, and circular imports. DB integration tests need
  # ~/.swarm-ai/ filesystem + async SQLite lifecycle that's flaky on CI.
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Create .env
        working-directory: ./backend
        run: cp .env.example .env

      - name: Smoke import — all Python modules (Linux)
        working-directory: ./backend
        run: |
          python -c "
          import importlib, pkgutil, sys

          skip_prefixes = ('tests.', 'skills.', 'jobs.handlers.', 'channels.')
          failures = []
          ok = 0

          for finder, mod_name, is_pkg in pkgutil.walk_packages(
              path=['.'], onerror=lambda name: None
          ):
              if any(mod_name.startswith(p) for p in skip_prefixes):
                  continue
              if mod_name.startswith('_') or '.test_' in mod_name:
                  continue
              try:
                  importlib.import_module(mod_name)
                  ok += 1
              except (ImportError, ModuleNotFoundError) as e:
                  print(f'  FAIL {mod_name}: {e}')
                  failures.append(mod_name)
              except SyntaxError as e:
                  print(f'  FAIL {mod_name}: SyntaxError: {e}')
                  failures.append(mod_name)
              except Exception:
                  # Runtime errors (missing env, DB, FastAPI app context) are
                  # expected in CI — the module loaded, just can't fully init.
                  ok += 1

          if failures:
              print(f'\n{len(failures)} module(s) failed to import on Linux')
              sys.exit(1)
          print(f'\nAll {ok} discovered modules imported successfully on Linux')
          "

      - name: Run non-DB tests
        working-directory: ./backend
        # Tests that don't need async SQLite, ~/.swarm-ai/, or macOS launchd.
        # Each ignore has a reason and date — review quarterly to graduate back.
        run: |
          SWARMAI_SUITE=1 python -m pytest -n 0 --timeout=120 -q --tb=short \
            -m "not slow and not pbt" \
            --ignore=tests/test_chat_scenarios_e2e.py \
            --ignore=tests/test_context_warning_bridge.py \
            --ignore=tests/test_daemon_sidecar_robustness.py \
            --ignore=tests/test_daemon_sidecar_fixes.py \
            --ignore=tests/test_jobs.py \
            --ignore=tests/test_e2e_integration.py \
            --ignore=tests/test_wiring_integration.py
          # ── CI-skipped test files (review quarterly) ──────────────
          # test_chat_scenarios_e2e.py      — async DB lifecycle race on cold runners (2026-04-28)
          # test_context_warning_bridge.py  — needs ~/.swarm-ai/ filesystem (2026-04-28)
          # test_daemon_sidecar_robustness.py — needs macOS launchd (2026-04-28)
          # test_daemon_sidecar_fixes.py    — needs macOS launchd (2026-04-28)
          # test_jobs.py                    — async DB + background scheduler (2026-04-28)
          # test_e2e_integration.py         — full DB lifecycle + filesystem (2026-04-28)
          # test_wiring_integration.py      — full DB lifecycle + filesystem (2026-04-28)
        timeout-minutes: 10

  # ── Frontend: typecheck + build (fast, ~1min) ───────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Install backend (for seed DB generation)
        working-directory: ./backend
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
          cp .env.example .env

      - name: TypeScript typecheck
        working-directory: ./desktop
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: ./desktop
        run: npm run build

  # ── Backend Windows: smoke import (~1min) ────────────────────
  # Catches Unix-only imports (fcntl, resource, grp) that crash on Windows.
  # Full test suite is Linux-only; this just verifies all modules load.
  backend-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        shell: bash
        run: |
          pip install uv
          uv venv .venv
          source .venv/Scripts/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/Scripts" >> $GITHUB_PATH
          cp .env.example .env

      - name: Smoke import — auto-discover all Python modules
        working-directory: ./backend
        shell: bash
        run: |
          python -c "
          import importlib, pkgutil, sys, os

          # Auto-discover all packages under backend/ — no hardcoded list.
          # If a new module adds 'import fcntl' at top level, this catches it.
          skip_prefixes = ('tests.', 'skills.', 'jobs.handlers.', 'channels.')
          failures = []
          ok = 0

          for finder, mod_name, is_pkg in pkgutil.walk_packages(
              path=['.'], onerror=lambda name: None
          ):
              if any(mod_name.startswith(p) for p in skip_prefixes):
                  continue
              if mod_name.startswith('_') or '.test_' in mod_name:
                  continue
              try:
                  importlib.import_module(mod_name)
                  ok += 1
              except (ImportError, ModuleNotFoundError) as e:
                  print(f'  FAIL {mod_name}: {e}')
                  failures.append(mod_name)
              except SyntaxError as e:
                  print(f'  FAIL {mod_name}: SyntaxError: {e}')
                  failures.append(mod_name)
              except Exception:
                  # Runtime errors (missing env, DB, FastAPI app context) are
                  # expected in CI — the module loaded, just can't fully init.
                  ok += 1

          if failures:
              print(f'\n{len(failures)} module(s) failed to import on Windows:')
              for f in failures:
                  print(f'  - {f}')
              sys.exit(1)
          print(f'\nAll {ok} discovered modules imported successfully on Windows')
          "

  # ── Version consistency check ───────────────────────────────
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check all version files match
        run: bash scripts/sync-version.sh check
