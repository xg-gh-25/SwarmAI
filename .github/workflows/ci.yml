name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: smoke import on Linux ────────────────────────────
  # Full test suite runs locally (macOS, 700+ tests, ~3min with xdist).
  # CI only verifies all modules import cleanly on Linux — catches missing
  # deps, syntax errors, and circular imports. DB integration tests need
  # ~/.swarm-ai/ filesystem + async SQLite lifecycle that's flaky on CI.
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Create .env
        working-directory: ./backend
        run: cp .env.example .env

      - name: Smoke import — all Python modules (Linux)
        working-directory: ./backend
        run: python ../scripts/smoke_import.py

      - name: Build non-DB test list
        id: test-list
        working-directory: ./backend
        # CI runners lack WAL-mode SQLite optimization → "database is locked"
        # on any test that touches the DB. Instead of a brittle ignore list,
        # dynamically find test files that DON'T import database/sqlite modules.
        # Also skip: macOS-only (launchd), native deps (ffmpeg).
        run: |
          # All test files that import database/sqlite — skip these
          DB_FILES=$(grep -rl 'from.*database\|import.*sqlite\|SQLiteDatabase\|aiosqlite' tests/ --include='test_*.py' | sort)

          # Additional skips: macOS-only, native deps
          EXTRA_SKIP="tests/test_daemon_sidecar_robustness.py tests/test_daemon_sidecar_fixes.py tests/test_voice_transcribe.py"

          # Build --ignore flags
          IGNORES=""
          for f in $DB_FILES $EXTRA_SKIP; do
            [ -f "$f" ] && IGNORES="$IGNORES --ignore=$f"
          done
          echo "ignores=$IGNORES" >> $GITHUB_OUTPUT

          # Count for logging
          SKIP_COUNT=$(echo "$IGNORES" | tr ' ' '\n' | grep -c ignore || true)
          ALL_COUNT=$(ls tests/test_*.py | wc -l)
          echo "Skipping $SKIP_COUNT DB/platform test files, running $((ALL_COUNT - SKIP_COUNT))/$ALL_COUNT"

      - name: Run non-DB tests
        working-directory: ./backend
        run: |
          SWARMAI_SUITE=1 python -m pytest -n 0 --timeout=120 -q --tb=short \
            --override-ini="maxfail=10" \
            -m "not slow and not pbt" \
            ${{ steps.test-list.outputs.ignores }}
        timeout-minutes: 10

  # ── Frontend: typecheck + build (fast, ~1min) ───────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Install backend (for seed DB generation)
        working-directory: ./backend
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
          cp .env.example .env

      - name: TypeScript typecheck
        working-directory: ./desktop
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: ./desktop
        run: npm run build

  # ── Backend Windows: smoke import (~1min) ────────────────────
  # Catches Unix-only imports (fcntl, resource, grp) that crash on Windows.
  # Full test suite is Linux-only; this just verifies all modules load.
  backend-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        shell: bash
        run: |
          pip install uv
          uv venv .venv
          source .venv/Scripts/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/Scripts" >> $GITHUB_PATH
          cp .env.example .env

      - name: Smoke import — all Python modules (Windows)
        working-directory: ./backend
        shell: bash
        run: python ../scripts/smoke_import.py

  # ── Version consistency check ───────────────────────────────
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check all version files match
        run: bash scripts/sync-version.sh check
