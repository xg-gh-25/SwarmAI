name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + test (fast, ~2min) ──────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Create .env
        working-directory: ./backend
        run: cp .env.example .env

      - name: Run tests
        working-directory: ./backend
        # -n 0: disable xdist in CI — parallel workers cause "database is locked"
        # on shared temp DBs. Serial is slower (~5min vs ~3min) but reliable.
        # -n 0: serial — avoids xdist parallel contention on shared temp DBs
        # --ignore e2e: full-app SSE tests have async DB lifecycle race on CI
        # (Ubuntu cold runner, pending tasks hold lock across test boundaries).
        # Tests pass locally; will re-enable when fixture uses per-test temp DB.
        run: SWARMAI_SUITE=1 python -m pytest -n 0 --timeout=120 -q --tb=short --ignore=tests/test_chat_scenarios_e2e.py
        timeout-minutes: 10

  # ── Frontend: typecheck + build (fast, ~1min) ───────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Install backend (for seed DB generation)
        working-directory: ./backend
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
          cp .env.example .env

      - name: TypeScript typecheck
        working-directory: ./desktop
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: ./desktop
        run: npm run build

  # ── Backend Windows: smoke import (~1min) ────────────────────
  # Catches Unix-only imports (fcntl, resource, grp) that crash on Windows.
  # Full test suite is Linux-only; this just verifies all modules load.
  backend-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        shell: bash
        run: |
          pip install uv
          uv venv .venv
          source .venv/Scripts/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/Scripts" >> $GITHUB_PATH
          cp .env.example .env

      - name: Smoke import — auto-discover all Python modules
        working-directory: ./backend
        shell: bash
        run: |
          python -c "
          import importlib, pkgutil, sys, os

          # Auto-discover all packages under backend/ — no hardcoded list.
          # If a new module adds 'import fcntl' at top level, this catches it.
          skip_prefixes = ('tests.', 'skills.', 'jobs.handlers.', 'channels.')
          failures = []
          ok = 0

          for finder, mod_name, is_pkg in pkgutil.walk_packages(
              path=['.'], onerror=lambda name: None
          ):
              if any(mod_name.startswith(p) for p in skip_prefixes):
                  continue
              if mod_name.startswith('_') or '.test_' in mod_name:
                  continue
              try:
                  importlib.import_module(mod_name)
                  ok += 1
              except Exception as e:
                  # Filter noise: some modules need runtime context (FastAPI app, etc.)
                  err = str(e)
                  if any(x in err for x in ['No module named', 'cannot import name']):
                      print(f'  FAIL {mod_name}: {e}')
                      failures.append(mod_name)
                  # Other errors (missing env, DB, etc.) are expected in CI — skip

          if failures:
              print(f'\n{len(failures)} module(s) failed to import on Windows:')
              for f in failures:
                  print(f'  - {f}')
              sys.exit(1)
          print(f'\nAll {ok} discovered modules imported successfully on Windows')
          "

  # ── Version consistency check ───────────────────────────────
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check all version files match
        run: bash scripts/sync-version.sh check
