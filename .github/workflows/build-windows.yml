name: Build Windows Release

on:
  # NOTE: tag-push triggers are handled by release.yml (unified pipeline).
  # This workflow is for manual builds only — prevents 3-way draft release race.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Create backend .env file
        working-directory: ./backend
        run: cp .env.example .env

      - name: Install backend Python dependencies
        working-directory: ./backend
        shell: bash
        run: |
          pip install uv
          uv venv .venv
          source .venv/Scripts/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/Scripts" >> $GITHUB_PATH

      - name: Sync version
        shell: bash
        run: bash scripts/sync-version.sh

      - name: Build application
        working-directory: ./desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run build:all
        shell: bash

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: SwarmAI-Windows-msi
          path: desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: SwarmAI-Windows-nsis
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  # Create release when triggered by tag
  create-release:
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f -name "*.msi" -o -name "*.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
          draft: true
          generate_release_notes: true
          name: "SwarmAI ${{ github.ref_name }} (Windows)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
