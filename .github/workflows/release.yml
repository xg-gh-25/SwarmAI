name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Create backend .env
        working-directory: ./backend
        run: cp .env.example .env

      - name: Install backend Python dependencies
        working-directory: ./backend
        run: |
          pip install uv
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Update version
        run: bash scripts/sync-version.sh "${{ needs.prepare.outputs.version }}"

      - name: Build Python backend
        working-directory: ./desktop
        run: bash scripts/build-backend.sh

      - name: Build frontend
        working-directory: ./desktop
        run: npm run build

      - name: Build Tauri app
        working-directory: ./desktop
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: ./desktop
        run: npm install

      - name: Create backend .env
        working-directory: ./backend
        run: cp .env.example .env

      - name: Install backend Python dependencies
        working-directory: ./backend
        shell: bash
        run: |
          pip install uv
          uv venv .venv
          source .venv/Scripts/activate
          uv pip install -e ".[dev]"
          echo "$VIRTUAL_ENV/Scripts" >> $GITHUB_PATH

      - name: Update version
        shell: bash
        run: bash scripts/sync-version.sh "${{ needs.prepare.outputs.version }}"

      - name: Build application
        working-directory: ./desktop
        shell: bash
        run: npm run build:all
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  build-hive:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Build frontend (shared with Desktop)
        working-directory: ./desktop
        run: npm run build

      - name: Update version
        run: bash scripts/sync-version.sh "${{ needs.prepare.outputs.version }}"

      - name: Package Hive tar.gz
        run: bash hive/release.sh "${{ needs.prepare.outputs.version }}"

      - name: Verify Hive package
        run: bash hive/verify_package.sh "dist/swarmai-hive-v${{ needs.prepare.outputs.version }}-linux-arm64.tar.gz"

      - name: Upload Hive package
        uses: actions/upload-artifact@v4
        with:
          name: hive-linux-arm64
          path: dist/swarmai-hive-*.tar.gz
          if-no-files-found: error

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: hive-checksums
          path: dist/checksums.txt

  publish:
    needs: [prepare, build-macos, build-windows, build-hive]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.dmg" -exec cp {} release/ \;
          find artifacts -name "*-setup.exe" -exec cp {} release/ \;
          find artifacts -name "*.msi" -exec cp {} release/ \;
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          find artifacts -name "checksums.txt" -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.prepare.outputs.version }}"
          name: "SwarmAI v${{ needs.prepare.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
